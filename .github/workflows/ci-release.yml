name: Semantic Release

on:
  push:
    branches:
      - main
      - alpha
      - beta

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Run semantic-release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          pnpm exec semantic-release 2>&1 | tee sr-output.txt
          TAG=$(grep -oP 'Published release \Kv?[^ ]+' sr-output.txt || true)
          if [ -n "$TAG" ]; then
            echo "tag=v${TAG#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger release build
        if: steps.semantic.outputs.tag != ''
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh workflow run release.yml -f tag=${{ steps.semantic.outputs.tag }}
